<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="https://i.imgur.com/AZKwJBP.png‎">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка на модератора · Ruthless Elite Zero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding-left: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                        url('https://i.imgur.com/iZ6Qsf4.png') center/cover fixed;
        }
        .apply-page {
            max-width: 640px;
            margin: 5vh auto;
            padding: 0 20px;
        }
        .apply-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .apply-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0e6d2, #c0b9a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .apply-header p {
            color: #a0a8b7;
            font-size: 1rem;
            margin-top: 8px;
        }
        .apply-header .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #c52b3a;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            transition: color 0.2s;
        }
        .apply-header .back-link:hover {
            color: #a8222e;
        }
        .form-container {
            animation: fadeUp 0.6s ease forwards;
        }
        .form-group .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 4px;
            display: none;
        }
        .form-group input.error,
        .form-group textarea.error {
            border-color: #f87171;
            box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.2);
        }
        body.light-theme .form-group input.error,
        body.light-theme .form-group textarea.error {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
        }
        body.light-theme .apply-header h1 {
            background: linear-gradient(135deg, #2c3e50, #4a5a6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="apply-page">
        <div class="apply-header">
            <h1>Заявка на модератора</h1>
            <p>𖤐Ruthless Elite Zero𖤐</p>
            <a href="rules.html" class="back-link"><i class="fas fa-arrow-left"></i> Назад к правилам</a>
        </div>

        <div class="form-container">
            <p class="form-desc">Заполните форму, чтобы подать заявку на модератора. Все поля обязательны.</p>
            <form id="mod-apply-form">
                <div class="form-group">
                    <label for="apply-nick">Ваш никнейм</label>
                    <input type="text" id="apply-nick" required placeholder="Например: Player123">
                    <div class="error-msg" id="nick-error">Никнейм должен содержать буквы и быть длиннее 2 символов</div>
                </div>
                <div class="form-group">
                    <label for="apply-discord">Ваш Discord</label>
                    <input type="text" id="apply-discord" required placeholder="Например: user0000">
                </div>
                <div class="form-group">
                    <label for="apply-age">Ваш возраст</label>
                    <input type="number" id="apply-age" required placeholder="Например: 14" min="13">
                </div>
                <div class="form-group">
                    <label for="apply-exp">Опыт модерации</label>
                    <select id="apply-exp" required>
                        <option value="">— Выберите —</option>
                        <option value="Нет опыта">Нет опыта</option>
                        <option value="Менее 6 месяцев">Менее 6 месяцев</option>
                        <option value="6–12 месяцев">6–12 месяцев</option>
                        <option value="Более года">Более года</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="apply-reason">Почему вы хотите стать модератором?</label>
                    <textarea id="apply-reason" rows="4" required placeholder="Напишите пару предложений..."></textarea>
                </div>
                <div class="form-group">
                    <label for="apply-extra">Дополнительная информация</label>
                    <textarea id="apply-extra" rows="3" placeholder="Ваши сильные стороны, график активности и т.д."></textarea>
                </div>
                <button type="submit" class="form-submit" id="apply-submit-btn">
                    <i class="fas fa-paper-plane"></i> Отправить заявку
                </button>
                <p class="form-status" id="apply-status"></p>
            </form>
        </div>
    </div>

    <script>
        (function() {
            const WEBHOOK_URL = 'https://discord.com/api/webhooks/1523395461057216593/Cv1oRkQJcj678TEGPfQgKuPsTHlSFEK4cCRCx8tJmao3aEOlzTt58yD469Jr9L4cXaKu';

            const form = document.getElementById('mod-apply-form');
            const statusEl = document.getElementById('apply-status');
            const submitBtn = document.getElementById('apply-submit-btn');

            function validateNick(nick) {
                return nick.length > 2 && /[a-zA-Zа-яА-ЯёЁ]/.test(nick);
            }

            if (form) {
                const nickInput = document.getElementById('apply-nick');
                const nickError = document.getElementById('nick-error');

                nickInput.addEventListener('input', () => {
                    if (!validateNick(nickInput.value)) {
                        nickInput.classList.add('error');
                        nickError.style.display = 'block';
                    } else {
                        nickInput.classList.remove('error');
                        nickError.style.display = 'none';
                    }
                });

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const nick = nickInput.value.trim();

                    if (!validateNick(nick)) {
                        nickInput.classList.add('error');
                        nickError.style.display = 'block';
                        nickInput.focus();
                        return;
                    }

                    const discord = document.getElementById('apply-discord').value.trim();
                    const age = document.getElementById('apply-age').value;
                    const exp = document.getElementById('apply-exp').value;
                    const reason = document.getElementById('apply-reason').value.trim();
                    const extra = document.getElementById('apply-extra').value.trim();

                    const embed = {
                        embeds: [{
                            title: 'Новая заявка на модератора',
                            color: 0xc52b3a,
                            fields: [
                                { name: 'Никнейм', value: nick, inline: true },
                                { name: 'Discord', value: discord, inline: true },
                                { name: 'Возраст', value: age, inline: true },
                                { name: 'Опыт модерации', value: exp, inline: true },
                                { name: 'Почему хочет стать модератором?', value: reason || '—' },
                                { name: 'Дополнительно', value: extra || '—' }
                            ],
                            footer: { text: 'Ruthless Elite Zero · Заявки' },
                            timestamp: new Date().toISOString()
                        }]
                    };

                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Отправка...';
                    statusEl.textContent = '';

                    try {
                        const res = await fetch(WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(embed)
                        });
                        if (res.ok) {
                            statusEl.style.color = '#4ade80';
                            statusEl.textContent = 'Заявка отправлена! Администрация рассмотрит её в ближайшее время.';
                            form.reset();
                            nickInput.classList.remove('error');
                            nickError.style.display = 'none';
                        } else {
                            throw new Error('Ошибка сервера');
                        }
                    } catch {
                        const text = Object.entries({
                            'Никнейм': nick,
                            'Discord': discord,
                            'Возраст': age,
                            'Опыт': exp,
                            'Почему': reason,
                            'Дополнительно': extra
                        }).map(([k, v]) => `**${k}:** ${v || '—'}`).join('\n');

                        try {
                            await navigator.clipboard.writeText(text);
                            statusEl.style.color = '#fbbf24';
                            statusEl.textContent = 'Не удалось отправить. Заявка скопирована в буфер — отправь админу вручную.';
                        } catch {
                            statusEl.style.color = '#f87171';
                            statusEl.textContent = 'Ошибка отправки. Попробуй позже или напиши администратору.';
                        }
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Отправить заявку';
                    }
                });
            }

            // Тема
            const savedTheme = localStorage.getItem('rezero-theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
            }
        })();
    </script>
</body>
</html>
